profile: live
instrument_id: BTCUSDT-PERP.BINANCE
order_id_tag: LIVE-001
client_id: BINANCE
timeframe: 5m
htf_timeframe: 1h
lookback_candles: 50
book_depth: 5
book_type: L2_MBP
eval_throttle_ms: 200
require_orderbook: true

# ── Volume Profile configuration ──────────────────────────────────────────────
# bucket_size: price granularity. 10.0 = $10 buckets for BTC at ~$90k.
# window_trades: rolling tape depth. 8000 ≈ 30-60 min of BTC tape at normal volume.
# value_area_pct: standard is 0.70 (70% of session volume = Value Area).
# hvn_percentile: top 25% by volume = High Volume Node.
# lvn_percentile: bottom 25% by volume = Low Volume Node (entries blocked here).
# proximity_bps: how close price must be to an HVN to fire at_hvn_below/above.
# session_mode: false = rolling window (adapts continuously).
#               true  = accumulates all session, resets on session open.
#               Use false for 24/7 crypto. Use true for equity/futures sessions.
vp_config:
  bucket_size: 10.0
  window_trades: 50000
  value_area_pct: 0.70
  hvn_percentile: 0.75
  lvn_percentile: 0.25
  proximity_bps: 12.0
  min_buckets: 50
  stop_buffer_bps: 30.0
  poc_band_bps: 8.0
  va_band_bps: 10.0
  session_mode: false

# ── Heatmap configuration ────────────────────────────────────────────────────
# Structural support/resistance walls for entry/exit
# bucket_size: price granularity (same scale as price_bucket_size × 5)
# window_trades: rolling tape — 8000 trades ≈ 30-60 min at normal BTC volume
# wall_percentile: top 80% of volumes = walls (institutional defense levels)
# stop_buffer_bps: CRITICAL — how far BEYOND the wall to place stops.
#   5 bps = too tight (stops in noise). Use 30-50 bps to give room for wicks.
# proximity_bps: how close price must be to wall to count as "at_support"
# min_walls: require at least 2 walls before trading (thick market)
heatmap_config:
  bucket_size: 50.0
  window_trades: 8000
  wall_percentile: 0.80
  proximity_bps: 15.0
  min_walls: 2
  ob_weight: 1.5
  stop_buffer_bps: 40.0

# ── Signal configuration ──────────────────────────────────────────────────────
# Primary: hvn_absorption (enter at HVN with absorption starting — earliest entry)
# Secondary: hvn_divergence (reversal at HVN — highest R:R when it works)
# Tertiary: poc_reclaim / poc_rejection (context shift signals)
# val_bounce / vah_rejection available but not in default set — add if needed.
signals_config:
  long:
    - poc_acceptance_retest_long
    - vah_acceptance_long
    - hvn_absorption_long
    - hvn_divergence_long
  short:
    - poc_acceptance_retest_short
    - val_acceptance_short
  module_kwargs:
    # Acceptance/retest params (breakout/acceptance)
    poc_band_bps: 12.0
    va_band_bps: 15.0
    acceptance_evals: 1
    retest_band_bps: 18.0
    retest_window_evals: 12
    absorption_min: 0.06
    ob_imb_min: 0.03
    min_hvn_volume_pct: 0.02
    require_htf_align: true         # Require HTF alignment

signal:
  imbalance_threshold: 0.15      # Raise from 0.10
  cvd_smoothing: 5
  absorption_min: 0.06           # Match module_kwargs
  stack_min_rows: 2              # Raise from 1
  ob_imb_threshold: 0.03         # Raise from 0.01
  large_vol_ratio_min: 0.08      # Raise from 0.05
  price_bucket_size: 1.0
  large_trade_pct: 0.90
  divergence_window: 3

risk:
  max_position_fraction: 1.0     # 100% of balance (paper trading - no real risk)
  max_notional_usdt: 1000.0      # $1k max position (paper only)
  max_daily_loss_pct: 3.0
  max_consecutive_losses: 4
  max_spread_bps: 15.0
  stale_tick_ms: 5000.0
  min_top_of_book_qty: 0.001
  kill_switch_path: null
  max_leverage: 3.0
  equity_state_path: orderflow/.equity_state.json
  loss_cooldown_secs: 90
  risk_per_trade_pct: 0.0025
  min_stop_bps: 12.0
  max_stop_bps: 250.0

execution:
  use_market_entries: true
  entry_post_only: false
  stoploss_pct: 0.015           # emergency backstop only — primary stop is HVN-anchored
  target_pct: 0.030             # fallback if no HVN target found
  trailing_trigger_pct: 0.012
  trailing_offset_pct: 0.006
  min_hold_secs: 15
  max_time_in_trade_secs: 43200
  acceptance_failure_secs: 60.0
  max_entry_drift_bps: 8.0
  backtest_fee_rate: 0.0004      # 4 bps per side (BINANCE taker-like)
  backtest_slippage_rate: 0.0002 # 2 bps per side synthetic slippage
  min_structural_rr: 1.8         # stricter: require stronger reward/risk at entry
  max_structural_stop_bps: 22.0  # stricter: skip wall stops likely to print ~-0.4% net
  short_rejection_min_confidence: 1.05  # require stronger confidence for short rejection setup
  short_rejection_size_mult: 0.6        # trade weaker setup with reduced size
  early_invalidation_secs: 120          # fast-fail window after entry
  early_invalidation_loss_pct: 0.0018   # cut quickly if thesis fails early (~18 bps move)

binance_environment: LIVE